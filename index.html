<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام أرقام الانتظار</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* ── Header ── */
    .header {
      background: #185FA5;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #title-display {
      font-size: 24px;
      font-weight: 600;
      color: #E6F1FB;
      flex: 1;
      text-align: center;
      outline: none;
      cursor: text;
      border-bottom: 1.5px dashed rgba(255,255,255,0.35);
      padding-bottom: 2px;
    }

    #title-display:focus {
      border-bottom-color: #ffffff;
    }

    .edit-icon {
      font-size: 18px;
      color: #85B7EB;
      flex-shrink: 0;
    }

    /* ── Number display ── */
    .number-section {
      padding: 2.5rem 1rem 1.5rem;
    }

    #num-display {
      font-size: 140px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: #0d1b2a;
      letter-spacing: 4px;
      transition: transform 0.13s ease, opacity 0.13s ease;
    }

    #sub-label {
      font-size: 20px;
      color: #6b7a8d;
      margin-top: 0.75rem;
      letter-spacing: 0.03em;
    }

    /* ── Controls ── */
    .controls {
      border-top: 1px solid #e8ecf0;
      padding: 1.25rem;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 10px;
    }

    button {
      cursor: pointer;
      border-radius: 10px;
      border: 1.5px solid #d0d8e4;
      background: #ffffff;
      color: #0d1b2a;
      font-size: 15px;
      padding: 10px 20px;
      transition: background 0.12s, transform 0.1s, border-color 0.12s;
      font-family: inherit;
    }

    button:hover { background: #f0f4f8; border-color: #b0bbc8; }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-big {
      font-size: 28px;
      padding: 16px 36px;
      font-weight: 600;
      min-width: 88px;
    }

    .btn-plus {
      background: #185FA5;
      color: #E6F1FB;
      border-color: #185FA5;
    }

    .btn-plus:hover { background: #1a6bbf; border-color: #1a6bbf; }

    .btn-reset {
      width: 100%;
      color: #6b7a8d;
      margin-bottom: 14px;
      font-size: 15px;
      padding: 10px;
    }

    /* ── Voice section ── */
    .voice-section {
      border-top: 1px solid #e8ecf0;
      padding-top: 14px;
    }

    .voice-label {
      font-size: 13px;
      color: #6b7a8d;
      margin-bottom: 10px;
    }

    .voice-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-sm {
      font-size: 13px;
      padding: 7px 16px;
    }

    #voice-status {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7a8d;
      min-height: 1.4em;
    }

    #voice-status.ok   { color: #2e7d32; }
    #voice-status.warn { color: #e65100; }

    /* ── Hint ── */
    /* .hint {
      margin-top: 0.75rem;
      font-size: 12px;
      color: #9aa3ae;
      text-align: center;
    } */
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div
      id="title-display"
      contenteditable="true"
      spellcheck="false"
      title="انقر للتعديل">رقم الانتظار</div>
    <span class="edit-icon">✎</span>
  </div>

  <!-- Number -->
  <div class="number-section">
    <div id="num-display">000</div>
    <div id="sub-label">جاهز</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="btn-row">
      <button class="btn-big" onclick="changeNum(-1)" title="تقليل">−</button>
      <button class="btn-big btn-plus" onclick="changeNum(1)" title="زيادة">+</button>
    </div>
    <button class="btn-reset" onclick="resetNum()">↺ &nbsp; إعادة تعيين إلى 0</button>

    <!-- Voice -->
    <div class="voice-section">
      <div class="voice-label">🔊 إعدادات الصوت</div>
      <div class="voice-actions">
        <button class="btn-sm" onclick="testVoice()">▶ اختبار</button>
        <button class="btn-sm" id="mute-btn" onclick="toggleMute()">🔇 كتم</button>
      </div>
      <div id="voice-status">جارٍ تحميل الصوت…</div>
    </div>
  </div>

</div>

<script>
  // ── State ──
  let num    = 0;
  let muted  = false;
  let arVoice = null;

  // ── Arabic word map (0–100) ──
  const arabicWords = [
    'صفر','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة',
    'عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر',
    'ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر','عشرون',
    'واحد وعشرون','اثنان وعشرون','ثلاثة وعشرون','أربعة وعشرون','خمسة وعشرون',
    'ستة وعشرون','سبعة وعشرون','ثمانية وعشرون','تسعة وعشرون','ثلاثون',
    'واحد وثلاثون','اثنان وثلاثون','ثلاثة وثلاثون','أربعة وثلاثون','خمسة وثلاثون',
    'ستة وثلاثون','سبعة وثلاثون','ثمانية وثلاثون','تسعة وثلاثون','أربعون',
    'واحد وأربعون','اثنان وأربعون','ثلاثة وأربعون','أربعة وأربعون','خمسة وأربعون',
    'ستة وأربعون','سبعة وأربعون','ثمانية وأربعون','تسعة وأربعون','خمسون',
    'واحد وخمسون','اثنان وخمسون','ثلاثة وخمسون','أربعة وخمسون','خمسة وخمسون',
    'ستة وخمسون','سبعة وخمسون','ثمانية وخمسون','تسعة وخمسون','ستون',
    'واحد وستون','اثنان وستون','ثلاثة وستون','أربعة وستون','خمسة وستون',
    'ستة وستون','سبعة وستون','ثمانية وستون','تسعة وستون','سبعون',
    'واحد وسبعون','اثنان وسبعون','ثلاثة وسبعون','أربعة وسبعون','خمسة وسبعون',
    'ستة وسبعون','سبعة وسبعون','ثمانية وسبعون','تسعة وسبعون','ثمانون',
    'واحد وثمانون','اثنان وثمانون','ثلاثة وثمانون','أربعة وثمانون','خمسة وثمانون',
    'ستة وثمانون','سبعة وثمانون','ثمانية وثمانون','تسعة وثمانون','تسعون',
    'واحد وتسعون','اثنان وتسعون','ثلاثة وتسعون','أربعة وتسعون','خمسة وتسعون',
    'ستة وتسعون','سبعة وتسعون','ثمانية وتسعون','تسعة وتسعون','مئة'
  ];

  // ── Helpers ──
  function pad(n) {
    return String(Math.max(0, n)).padStart(3, '0');
  }

  function toArabicWord(n) {
    if (n >= 0 && n <= 100) return arabicWords[n];
    // For numbers above 100 — let the TTS engine handle it naturally
    return String(n);
  }

  // ── Render ──
  function render() {
    document.getElementById('num-display').textContent = pad(num);
    document.getElementById('sub-label').textContent =
      num === 0 ? 'جاهز' : 'رقم طالب';
  }

  // ── Flash animation ──
  function flash(scale) {
    const el = document.getElementById('num-display');
    el.style.transform = `scale(${scale})`;
    el.style.opacity   = '0.4';
    setTimeout(() => {
      el.style.transform = 'scale(1)';
      el.style.opacity   = '1';
    }, 130);
  }

  // ── Speech ──
  function speak(text) {
    if (muted || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt  = new SpeechSynthesisUtterance(text);
    utt.lang   = 'ar-SA';
    utt.rate   = 0.88;
    utt.pitch  = 0.82;   // slightly lower = more masculine
    if (arVoice) utt.voice = arVoice;
    window.speechSynthesis.speak(utt);
  }

  function buildSpeech(n) {
    const title = document.getElementById('title-display')
                          .textContent.trim() || 'رقم الانتظار';
    // return `${title}. رقم ${toArabicWord(n)}`;
    return `. رقم ${toArabicWord(n)}`;
  }

  // ── Actions ──
  function changeNum(dir) {
    if (num + dir < 0) return;
    num += dir;
    flash(dir > 0 ? 1.14 : 0.88);
    render();
    speak(buildSpeech(num));
  }

  function resetNum() {
    num = 0;
    flash(0.9);
    render();
    speak('إعادة تعيين إلى صفر');
  }

  function testVoice() {
    speak(buildSpeech(num));
  }

  function toggleMute() {
    muted = !muted;
    const btn = document.getElementById('mute-btn');
    btn.textContent = muted ? '🔊 تفعيل' : '🔇 كتم';
    if (muted) window.speechSynthesis.cancel();
  }

  // ── Voice loader ──
  function loadVoices() {
    const all      = window.speechSynthesis.getVoices();
    const arVoices = all.filter(v => v.lang.startsWith('ar'));
    const maleKeys = ['male','man','omar','khalid','tarik','naayf','google arabic'];

    // Try to pick a male Arabic voice, fall back to any Arabic voice
    let picked = arVoices.find(v =>
      maleKeys.some(k => v.name.toLowerCase().includes(k))
    );
    if (!picked) picked = arVoices[0] || null;

    arVoice = picked;

    const status = document.getElementById('voice-status');
    if (picked) {
      status.textContent = `الصوت: ${picked.name}`;
      status.className   = 'ok';
    } else {
      status.textContent = 'لم يُعثر على صوت عربي — سيُستخدم الصوت الافتراضي';
      status.className   = 'warn';
    }
  }

  // Chrome loads voices asynchronously
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
  }

  // ── Init ──
  render();
</script>
</body>
</html>
